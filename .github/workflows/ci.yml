name: CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11", cache: pip }
      - run: pip install ruff
      - run: ruff check . --select E,W,F,I --ignore E501

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11", cache: pip }
      - run: pip install -r requirements.txt pytest pytest-mock
      - name: Guardrail tests (no credentials needed)
        run: pytest tests/test_guardrails.py -v --tb=short
      - name: Integration tests (mocked)
        run: pytest tests/test_agent_integration.py -v --tb=short
        env:
          DB_HOST: localhost
          DB_PORT: "5432"
          DB_NAME: test
          DB_USER: test
          DB_PASSWORD: test
          GROQ_API_KEY: gsk_dummy
          LLM_PROVIDER: groq
          LLM_MODEL: llama-3.3-70b-versatile

  docker:
    name: Build & Push
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
